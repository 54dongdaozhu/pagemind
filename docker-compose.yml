services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pagemind}
      POSTGRES_USER: ${POSTGRES_USER:-pagemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pagemind}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-pagemind}\" -d \"${POSTGRES_DB:-pagemind}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./services/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pagemind}:${POSTGRES_PASSWORD:-pagemind}@postgres:5432/${POSTGRES_DB:-pagemind}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-pagemind}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      BUILTIN_USERNAME: ${BUILTIN_USERNAME:-meng}
      BUILTIN_PASSWORD: ${BUILTIN_PASSWORD}
      BUILTIN_EMAIL: ${BUILTIN_EMAIL:-meng@local}
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ./services/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pagemind}:${POSTGRES_PASSWORD:-pagemind}@postgres:5432/${POSTGRES_DB:-pagemind}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-pagemind}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      BUILTIN_USERNAME: ${BUILTIN_USERNAME:-meng}
      BUILTIN_PASSWORD: ${BUILTIN_PASSWORD}
      BUILTIN_EMAIL: ${BUILTIN_EMAIL:-meng@local}
    volumes:
      - backend-data:/data
    command: python worker.py
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      target: runner
    depends_on:
      backend:
        condition: service_healthy
      multi-agents:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  multi-agents:
    build:
      context: ./services/multi-agents
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8001"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BACKEND_URL: http://backend:8000
      DOC_GEN_WORD_DIR: /tmp/doc-gen
    volumes:
      - doc-gen-files:/tmp/doc-gen
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
  redis-data:
  certbot-webroot:
  certbot-certs:
  doc-gen-files:
