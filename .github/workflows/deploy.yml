name: Deploy Containers

on:
  workflow_run:
    workflows:
      - Build and Publish Container Images
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

jobs:
  check-secrets:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.required.outputs.enabled }}
    steps:
      - name: Check required deployment secrets
        id: required
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -n "${DEPLOY_HOST}" ] && [ -n "${DEPLOY_USER}" ] && [ -n "${DEPLOY_SSH_KEY}" ] && [ -n "${DEPLOY_PATH}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets are incomplete; skipping deploy."
          fi

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.enabled == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.deploy.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          UVICORN_WORKERS: ${{ secrets.UVICORN_WORKERS }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,DEEPSEEK_API_KEY,DEEPSEEK_BASE_URL,EMBEDDING_API_KEY,EMBEDDING_BASE_URL,EMBEDDING_MODEL,ALLOWED_ORIGINS,FRONTEND_PORT,UVICORN_WORKERS,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            cat > .env <<EOF
            IMAGE_TAG=${IMAGE_TAG}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
            EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
            EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
            EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
            ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
            FRONTEND_PORT=${FRONTEND_PORT:-80}
            UVICORN_WORKERS=${UVICORN_WORKERS:-1}
            EOF

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi

            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            docker image prune -f
