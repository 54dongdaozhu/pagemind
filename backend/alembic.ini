[alembic]
# 迁移脚本目录（相对于本文件所在目录）
script_location = %(here)s/alembic

# 版本文件命名模板
file_template = %%(rev)s_%%(slug)s

# 在 sys.path 中插入 backend/ 目录，使 `from app.*` 可用
prepend_sys_path = .

# 多个版本目录时的路径分隔符
version_path_separator = os

# 数据库 URL 由 env.py 从 DATABASE_URL 环境变量读取，此处不配置
# sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
